general {
  colors = true
  interval = 2
  output_format = "i3bar"
}


wireless wlp0s20f3{
  format_up = "%essid %ip"
  format_down = "no WiFi"
}

tztime local {
  format = "%Y-%m-%d %H:%M"
}

load {
  format = "%1min"
}

disk "/" {
  format = "%free"
}

cpu_usage {
  format = "CPU %usage"
}

cpu_temperature 0 {
  format = "%degrees°C"
}

volume master {
  format = "VOL %volume"
  format_muted = "MUTE"
}

battery 0 {
  format = "%status %percentage"
}

order += "wireless wlx00ebd8762b9d"
order += "disk /"
order += "cpu_usage"
order += "load"
order += "cpu_temperature 0"
order += "volume master"
order += "battery 0"
order += "tztime local"
