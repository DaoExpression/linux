# Tmux Config 
set -g @TMUXHOST i7nv
set -q -g utf8 on
set -g base-index 1
set -g pane-base-index 1
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none
set -g status-bg black
set -g status-interval 60

setw -g status on
setw -g monitor-activity off
setw  -g mode-keys vi

set-option -g status-position top
set-option -g default-shell /bin/bash
set-option -g set-titles on
set-option -g renumber-windows on

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf
# Theme 
setw -g window-status-format "#[fg=gray]#[bg=black] *#I #[bg=black]#[fg=gray] #W "
setw -g window-status-current-format "#[bg=cyan]#[white] *#I #[bg=white]#[fg=black] [#W] "
set-window-option -g window-status-separator "\/"
set-window-option -g window-status-current-format "#[fg=colour237, bg=colour214, nobold, noitalics, nounderscore]#[fg=colour239, bg=colour221] #I #[fg=colour239, bg=colour214, bold] #W #[fg=colour214, bg=colour237, nobold, noitalics, nounderscore]"
set-window-option -g window-status-format "#[fg=colour237,bg=colour239,noitalics]#[fg=colour223,bg=colour239] #I #[fg=colour223, bg=colour239] #W #[fg=colour239, bg=colour237, noitalics]"
set-window-option -g window-status-activity-style bg=colour237,fg=colour248
set-window-option -g window-status-current-style bg=red,fg=colour237 
set-window-option -g clock-mode-colour colour109 
set-window-option -g window-status-bell-style bg=colour167,fg=colour235

set-option -g pane-active-border-style fg=colour250 
set-option -g pane-border-style fg=colour237 

set-option -g message-style bg=colour239,fg=colour223
set-option -g message-command-style bg=colour239,fg=colour223

set-option -g display-panes-active-colour colour250 #fg2
set-option -g display-panes-colour colour237 #bg1

set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-left "#[fg=colour250, bg=colour241] #S #[fg=colour241, bg=colour237, nobold, noitalics, nounderscore]"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-option -g status-right "#[fg=colour239, bg=colour237, nobold, nounderscore, noitalics]#[fg=colour246,bg=colour239] %Y-%m-%d #[fg=colour230,bg=colour244] %H:%M #[fg=colour248, bg=colour239, nobold, noitalics, nounderscore]#[fg=colour237, bg=colour255] i7nv@#{@TMUXHOST}"

